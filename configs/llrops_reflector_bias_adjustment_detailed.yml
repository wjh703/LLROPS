# ==============================================================================
# llrops v33 detailed template: estimate reflector coordinates + station range bias
# ==============================================================================
#
# Current code base:
#   llrops_project_erfa_refactor.zip
#
# Run serial, single process:
#   python -m llrops run llrops_reflector_bias_adjustment_detailed.yml
#
# Run with MPI multi-rank:
#   mpirun -n 16 python -m llrops run llrops_reflector_bias_adjustment_detailed.yml --mpi
#   # or on SLURM:
#   srun python -m llrops run llrops_reflector_bias_adjustment_detailed.yml --mpi
#
# Important:
# - LlrReflectorFit has been removed.
# - Reflector fitting is now LlrAdjustment + reflectorPosition.
# - Local serial ProcessPoolExecutor parallelism has been removed.
# - Do not use the old "parallel: {enabled, workers, chunksize}" block.
# - In MPI mode, only the "mpi.chunksize" option below controls O-C task size.
# - rangeBias is the forward-model range-bias class config.
# - stationRangeBias per=station+interval requires explicit intervals/periods.
# - All paths below are examples. Edit variables.* first.
# - Time/Earth-rotation transforms now use ERFA + explicit IERS C04 EOP; Astropy is not required.

variables:
  # ---------------------------------------------------------------------------
  # Base directories
  # ---------------------------------------------------------------------------
  dataDir: ~/deploy_bundle/data
  outputDir: output


globals:
  # ---------------------------------------------------------------------------
  # Ephemerides and EOP
  # ---------------------------------------------------------------------------
  ephemerides:
    type: calceph
    file: "{dataDir}/kernels/inpop21a_TDB_m100_p100_tt.dat"
    longitudeLibrationCorrection: inpop21a

  earthRotation:
    # Explicit IERS C04 EOP file used by the ERFA ITRS<->GCRS transform.
    # No process-global Astropy EOP table is installed or modified.
    type: iersC04
    file: "{dataDir}/auxiliary/eopc04.1962-now.txt"
    # Some concatenated C04 files contain repeated boundary days.
    # This is explicit so duplicate EOP rows are never silently resolved.
    duplicateMjdPolicy: last

  # ---------------------------------------------------------------------------
  # Delay models
  # ---------------------------------------------------------------------------
  # Available troposphere: mendesPavlis | none
  troposphere:
    type: mendesPavlis

  # Available relativity: iersShapiro | none
  relativity:
    type: iersShapiro

  # ---------------------------------------------------------------------------
  # Station / reflector displacement
  # ---------------------------------------------------------------------------
  stationDisplacement:
    type: sum
    components:
      - type: iers2010SolidEarthTide
      - type: iers2010PoleTide
      - type: iers2010OceanPoleTide
        coefficientFile: "{dataDir}/auxiliary/opoleloadcoefcmcor.txt"

  # Alternative:
  # stationDisplacement:
  #   type: none

  reflectorDisplacement:
    type: lunarSolidTide
    # Optional lunar solid tide parameters:
    # h2: 0.0
    # l2: 0.0
    # r_moon: 1737400.0

  # Alternative:
  # reflectorDisplacement:
  #   type: none

  # ---------------------------------------------------------------------------
  # Fixed forward-model range-bias correction
  # ---------------------------------------------------------------------------
  # Important modeling choice:
  # - {type: inpop21} applies built-in fixed station range-bias corrections before
  #   estimation.
  # - {type: none} lets estimated stationRangeBias parameters absorb these effects.
  #
  # For a pure "estimate station range bias from the data" experiment, keep this
  # as none. For INPOP21-style O-C comparison, switch it to {type: inpop21}.
  rangeBias:
    type: none

  uncertaintyModel:
    type: wrms-table
    model: default

  stationCatalog: builtin
  reflectorCatalog: builtin

programs:
  # ---------------------------------------------------------------------------
  # Main nonlinear adjustment
  # ---------------------------------------------------------------------------
  - program: LlrAdjustment
    enabled: true

    # MINI, CRD/FRD, or LLROPS .llnpt/.llrops.jsonl files and directories.
    inputNormalPoints:
      - "{dataDir}/polac/TOTALOBS6924.DAT"

    miniIoLog: "{outputDir}/mini_io_log.txt"

    # Input grouping. If true, all sources become one combined dataset.
    # normal_point_index remains globally unique either way.
    combineInputs: false
    combinedName: combined

    # UTC filtering.
    startTime: null
    endTime: null

    # Catalog resolution overrides. Usually leave null.
    stationName: null
    reflectorName: null

    # Observation uncertainty:
    #   wrms-table | mini
    uncertainty: wrms-table

    # LlrAdjustment needs reflector design partials. Keep this true.
    # If set false, reflectorPosition estimation will fail because the
    # reflector_position_pa partial block will be missing.
    includeReflectorDesign: true

    # outputLevel is effectively full when includeReflectorDesign is true.
    # Full output includes troposphere elevation clamp diagnostics.
    outputLevel: full

    # Horizon threshold is diagnostic only; rows are not filtered by it.
    minElevationDeg: 0.0

    showProgress: true

    # -------------------------------------------------------------------------
    # Estimated parameters
    # -------------------------------------------------------------------------
    parametrization:
      # -----------------------------------------------------------------------
      # Reflector coordinate corrections
      # -----------------------------------------------------------------------
      # Estimates PA-frame coordinate corrections, 3 parameters per reflector:
      #   <reflector>.position.x
      #   <reflector>.position.y
      #   <reflector>.position.z
      #
      # If reflectors is omitted/null, all observed reflectors are estimated.
      # Builtin reflector keys include:
      #   APOLLO11, APOLLO14, APOLLO15, LUNOKHOD1, LUNOKHOD2
      - type: reflectorPosition
        reflectors:
          - APOLLO11
          - APOLLO14
          - APOLLO15
          - LUNOKHOD1
          - LUNOKHOD2

      # -----------------------------------------------------------------------
      # Station range-bias parameters
      # -----------------------------------------------------------------------
      # Estimates additive one-way station range bias in metres.
      #
      # Choose ONE of these two modes.
      #
      # Mode A: one constant bias per station.
      # Uncomment this block and comment out Mode B below if you want this:
      #
      # - type: stationRangeBias
      #   per: station
      #   stations:
      #     - APOLLO
      #     - GRASSE
      #     - MATERA
      #     - WETTZELL
      #     - MLRS1
      #     - MLRS2
      #
      # Mode B: one bias per station + explicit interval.
      # This is active by default below.
      #
      # Accepted interval forms:
      #   1) Mapping station -> list:
      #        APOLLO:
      #          - 2006-04-07/2010-11-01
      #          - {start: 2010-11-01, end: 2012-04-07, name: APO_2010_2012}
      #
      #   2) List form:
      #        - {station: APOLLO, start: 2006-04-07, end: 2010-11-01, name: APO_2006_2010}
      #
      # The list form is used here because it lets you assign stable names.
      # Overlapping intervals are allowed by the code; observations inside an
      # overlap activate multiple bias columns. If a solve becomes singular,
      # reduce overlapping intervals or narrow the estimated station set.
      - type: stationRangeBias
        per: station+interval
        intervals:
          # APOLLO / APOLLO Apache Point examples from the built-in INPOP21a table.
          - {station: APOLLO, start: 2006-04-07, end: 2010-11-01, name: APOLLO_20060407_20101101}
          - {station: APOLLO, start: 2007-12-15, end: 2008-06-30, name: APOLLO_20071215_20080630}
          - {station: APOLLO, start: 2008-09-20, end: 2009-06-20, name: APOLLO_20080920_20090620}
          - {station: APOLLO, start: 2010-11-01, end: 2012-04-07, name: APOLLO_20101101_20120407}
          - {station: APOLLO, start: 2012-04-07, end: 2013-09-02, name: APOLLO_20120407_20130902}

          # GRASSE examples.
          - {station: GRASSE, start: 1984-06-01, end: 1986-06-13, name: GRASSE_19840601_19860613}
          - {station: GRASSE, start: 1987-10-01, end: 2005-08-01, name: GRASSE_19871001_20050801}
          - {station: GRASSE, start: 1993-03-01, end: 1996-10-01, name: GRASSE_19930301_19961001}
          - {station: GRASSE, start: 1996-12-10, end: 1997-01-18, name: GRASSE_19961210_19970118}
          - {station: GRASSE, start: 1997-02-08, end: 1998-06-24, name: GRASSE_19970208_19980624}
          - {station: GRASSE, start: 2004-12-04, end: 2004-12-07, name: GRASSE_20041204_20041207}
          - {station: GRASSE, start: 2005-01-03, end: 2005-01-06, name: GRASSE_20050103_20050106}
          - {station: GRASSE, start: 2009-11-01, end: 2014-01-01, name: GRASSE_20091101_20140101}
          - {station: GRASSE, start: 2015-12-20, end: 2015-12-21, name: GRASSE_20151220_20151221}

          # Other station examples.
          - {station: HALEAKALA, start: 1984-11-01, end: 1990-09-01, name: HALEAKALA_19841101_19900901}
          - {station: HALEAKALA, start: 1984-11-01, end: 1986-04-01, name: HALEAKALA_19841101_19860401}
          - {station: HALEAKALA, start: 1986-04-02, end: 1987-07-30, name: HALEAKALA_19860402_19870730}
          - {station: HALEAKALA, start: 1987-07-31, end: 1987-08-14, name: HALEAKALA_19870731_19870814}
          - {station: HALEAKALA, start: 1985-06-09, end: 1985-06-10, name: HALEAKALA_19850609_19850610}
          - {station: HALEAKALA, start: 1987-11-10, end: 1988-02-18, name: HALEAKALA_19871110_19880218}
          - {station: HALEAKALA, start: 1990-02-06, end: 1990-09-01, name: HALEAKALA_19900206_19900901}
          - {station: MATERA, start: 2003-01-01, end: 2016-01-01, name: MATERA_20030101_20160101}
          - {station: MCDONALD, start: 1969-01-01, end: 1985-07-01, name: MCDONALD_19690101_19850701}
          - {station: MCDONALD, start: 1971-12-01, end: 1972-12-05, name: MCDONALD_19711201_19721205}
          - {station: MCDONALD, start: 1972-04-21, end: 1972-04-27, name: MCDONALD_19720421_19720427}
          - {station: MCDONALD, start: 1974-08-18, end: 1974-10-16, name: MCDONALD_19740818_19741016}
          - {station: MCDONALD, start: 1975-10-05, end: 1976-03-01, name: MCDONALD_19751005_19760301}
          - {station: MCDONALD, start: 1983-12-01, end: 1984-01-17, name: MCDONALD_19831201_19840117}
          - {station: MLRS1, start: 1983-08-01, end: 1988-01-28, name: MLRS1_19830801_19880128}
          - {station: WETTZELL, start: 2018-01-01, end: 2025-01-01, name: WETTZELL_20180101_20250101}

    # -------------------------------------------------------------------------
    # Nonlinear least-squares control
    # -------------------------------------------------------------------------
    adjustment:
      # Maximum Gauss-Newton iterations.
      maxIterations: 20

      # Step length multiplier.
      # 1.0 = full step; 0.5 = damped conservative step.
      damping: 1.0

      # Convergence tolerance on max parameter-block update norm, metres.
      updateToleranceM: 1.0e-3

      # Convergence tolerance on absolute WRMS change between iterations, metres.
      wrmsToleranceM: 1.0e-4

      # First-pass gross rejection before the first solve.
      # The test is abs(reduced observation) > threshold.
      prefitGrossThresholdM: 20.0

      # Station-specific overrides. Null disables prefit gross rejection for
      # that station only. Matching tries station_key / station name / station code.
      prefitGrossThresholdByStationM:
        APOLLO: 0.5
        GRASSE: 1.0
        MATERA: 0.5
        WETTZELL: 0.5
        HALEAKALA: 1.5
        MCDONALD: 2
        MLRS1: 1.5
        MLRS2: 1.5

      # Post-fit outlier logic on linearized residual:
      #   v_i = L_i - a_i @ delta
      outlier:
        enabled: true
        sigmaFactor: 4.0
        reentry: false


    # MPI task granularity; ignored in normal serial execution.
    mpi:
      chunksize: 8

    # Output adjustment summary JSON.
    outputJson: "{outputDir}/reflector_bias_adjustment.json"

    # Optional last-iteration normal equations stem:
    # writes:
    #   {outputNormals}.npz
    #   {outputNormals}.parameters.json
    outputNormals: null

  # ---------------------------------------------------------------------------
  # Optional fixed-linearization normal-equation split workflow.
  # Disabled by default. This is useful if you later want to build normal
  # equations by station/time block and combine them.
  # ---------------------------------------------------------------------------
  # - program: LlrNormalEquations
  #   enabled: false
  #   inputNormalPoints:
  #     - "{inputNp}"
  #   miniIoLog: "{miniIoLog}"
  #   combineInputs: false
  #   startTime: null
  #   endTime: null
  #   stationName: null
  #   reflectorName: null
  #   uncertainty: wrms-table
  #   includeReflectorDesign: true
  #   outputLevel: full
  #   minElevationDeg: 0.0
  #   showProgress: true
  #   parametrization:
  #     - type: reflectorPosition
  #       reflectors: [APOLLO15]
  #     - type: stationRangeBias
  #       per: station
  #       stations: [APOLLO, GRASSE]
  #   mpi:
  #     chunksize: 8
  #   outputNormals: "{outputDir}/normals/block_example"

  # - program: NormalsCombineSolve
  #   enabled: false
  #   inputNormals:
  #     - "{outputDir}/normals/block_example"
  #   outputSolutionJson: "{outputDir}/combined_solution.json"
  #   outputNormals: "{outputDir}/normals/combined"
