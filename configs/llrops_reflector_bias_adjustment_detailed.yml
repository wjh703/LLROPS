# ==============================================================================
# LLROPS nonlinear adjustment: reflector coordinates + station range bias
# ==============================================================================
#
# Current program implementation:
#   llrops/programs/llr_adjustment.py
# Configurable observation classes are assembled by:
#   llrops/classes/observation_factory.py
#
# Run serial, single process:
#   uv run python -m llrops run configs/llrops_reflector_bias_adjustment_detailed.yml
#
# Run with 32 MPI ranks:
#   uv run mpirun -n 32 python -m llrops run configs/llrops_reflector_bias_adjustment_detailed.yml --mpi
#   # or on SLURM:
#   uv run srun python -m llrops run configs/llrops_reflector_bias_adjustment_detailed.yml --mpi
#
# Important:
# - LlrReflectorFit has been removed.
# - Reflector fitting is now LlrAdjustment + reflectorPosition.
# - Local serial ProcessPoolExecutor parallelism has been removed.
# - Do not use the old "parallel: {enabled, workers, chunksize}" block.
# - In MPI mode, only the "mpi.chunksize" option below controls O-C task size.
# - rangeBias is the forward-model range-bias class config.
# - stationRangeBias per=station+interval requires explicit intervals/periods.
# - Override variables.* when running with a different data or output directory.
# - Time/Earth-rotation transforms now use ERFA + explicit IERS C04 EOP; Astropy is not required.

variables:
  # ---------------------------------------------------------------------------
  # Base directories
  # ---------------------------------------------------------------------------
  dataDir: ~/deploy_bundle/data
  outputDir: output


globals:
  # ---------------------------------------------------------------------------
  # Ephemerides and EOP
  # ---------------------------------------------------------------------------
  ephemerides:
    type: calceph
    file: "{dataDir}/kernels/inpop21a_TDB_m100_p100_tt.dat"
    longitudeLibrationCorrection: inpop21a

  earthRotation:
    # Explicit IERS C04 EOP file used by the ERFA ITRS<->GCRS transform.
    # No process-global Astropy EOP table is installed or modified.
    type: iersC04
    file: "{dataDir}/auxiliary/eopc04.1962-now.txt"
    # Some concatenated C04 files contain repeated boundary days.
    # This is explicit so duplicate EOP rows are never silently resolved.
    duplicateMjdPolicy: last

  # ---------------------------------------------------------------------------
  # Delay models
  # ---------------------------------------------------------------------------
  # Available troposphere: mendesPavlis | none
  troposphere:
    type: mendesPavlis

  # Available relativity: iersShapiro | none
  relativity:
    type: iersShapiro

  # ---------------------------------------------------------------------------
  # Station / reflector displacement
  # ---------------------------------------------------------------------------
  stationDisplacement:
    type: sum
    components:
      - type: iers2010SolidEarthTide
      - type: iers2010PoleTide
      - type: iers2010OceanPoleTide
        coefficientFile: "{dataDir}/auxiliary/opoleloadcoefcmcor.txt"

  # Alternative:
  # stationDisplacement:
  #   type: none

  reflectorDisplacement:
    type: lunarSolidTide
    # Optional lunar solid tide parameters:
    # h2: 0.0
    # l2: 0.0
    # r_moon: 1737400.0

  # Alternative:
  # reflectorDisplacement:
  #   type: none

  # ---------------------------------------------------------------------------
  # Fixed forward-model range-bias correction
  # ---------------------------------------------------------------------------
  # Important modeling choice:
  # - {type: inpop21} applies built-in fixed station range-bias corrections before
  #   estimation.
  # - {type: none} lets estimated stationRangeBias parameters absorb these effects.
  #
  # For a pure "estimate station range bias from the data" experiment, keep this
  # as none. For INPOP21-style O-C comparison, switch it to {type: inpop21}.
  rangeBias:
    type: none

  stationCatalog: builtin
  reflectorCatalog: builtin

programs:
  # Program names are resolved through llrops/programs/registry.py. This file
  # intentionally runs only LlrAdjustment; fixed-linearization normal-equation
  # generation and combination are separate configurable programs.

  # ---------------------------------------------------------------------------
  # Main nonlinear adjustment
  # ---------------------------------------------------------------------------
  - program: LlrAdjustment
    enabled: true

    # MINI, CRD/FRD, or LLROPS .llnpt/.llrops.jsonl files and directories.
    inputNormalPoints:
      - "{dataDir}/polac/TOTALOBS6924.DAT"

    miniIoLog: "{outputDir}/mini_io_log.txt"

    # Input grouping. If true, all sources become one combined dataset.
    # normal_point_index remains globally unique either way.
    combineInputs: false
    combinedName: combined

    # UTC filtering.
    startTime: null
    endTime: null

    # Catalog resolution overrides. Usually leave null.
    stationName: null
    reflectorName: null

    # Observation uncertainty is read from each input normal-point record.
    # MINI supplies its uncertainty field; CRD supplies record 11 bin RMS.

    # LlrAdjustment always requests reflector design partials from the
    # observation pipeline; no residual-table outputLevel is needed here.

    # Horizon threshold is diagnostic only; rows are not filtered by it.
    minElevationDeg: 3.0

    showProgress: true

    # -------------------------------------------------------------------------
    # Estimated parameters
    # -------------------------------------------------------------------------
    parametrization:
      # -----------------------------------------------------------------------
      # Reflector coordinate corrections
      # -----------------------------------------------------------------------
      # Estimates PA-frame coordinate corrections, 3 parameters per reflector:
      #   <reflector>.position.x
      #   <reflector>.position.y
      #   <reflector>.position.z
      #
      # If reflectors is omitted/null, all observed reflectors are estimated.
      # Builtin reflector keys include:
      #   APOLLO11, APOLLO14, APOLLO15, LUNOKHOD1, LUNOKHOD2
      - type: reflectorPosition
        reflectors:
          - APOLLO11
          - APOLLO14
          - APOLLO15
          - LUNOKHOD1
          - LUNOKHOD2

      # -----------------------------------------------------------------------
      # Station range-bias parameters
      # -----------------------------------------------------------------------
      # Estimates additive one-way station range bias in metres.
      #
      # Choose ONE of these two modes.
      #
      # Mode A: one constant bias per station.
      # Uncomment this block and comment out Mode B below if you want this:
      #
      # - type: stationRangeBias
      #   per: station
      #   stations:
      #     - APOLLO
      #     - GRASSE
      #     - MATERA
      #     - WETTZELL
      #     - MLRS1
      #     - MLRS2
      #
      # Mode B: one bias per station + explicit interval.
      # This is active by default below.
      #
      # Accepted interval forms:
      #   1) Mapping station -> list:
      #        APOLLO:
      #          - 2006-04-07/2010-11-01
      #          - {start: 2010-11-01, end: 2012-04-07, name: APO_2010_2012}
      #
      #   2) List form:
      #        - {station: APOLLO, start: 2006-04-07, end: 2010-11-01, name: APO_2006_2010}
      #
      # The list form is used here because it lets you assign stable names.
      # Overlapping intervals are allowed by the code; observations inside an
      # overlap activate multiple bias columns. If a solve becomes singular,
      # reduce overlapping intervals or narrow the estimated station set.
      - type: stationRangeBias
        per: station+interval
        intervals:
          # The original table's inclusive dates are represented as
          # [start, end_exclusive). Overlaps remain additive.
          - {station: APOLLO, start: 2006-04-07, end_exclusive: 2010-11-02, name: APOLLO_20060407_20101101}
          - {station: APOLLO, start: 2007-12-15, end_exclusive: 2008-07-01, name: APOLLO_20071215_20080630}
          - {station: APOLLO, start: 2008-09-20, end_exclusive: 2009-06-21, name: APOLLO_20080920_20090620}
          - {station: APOLLO, start: 2010-11-01, end_exclusive: 2012-04-08, name: APOLLO_20101101_20120407}
          - {station: APOLLO, start: 2012-04-07, end_exclusive: 2013-09-03, name: APOLLO_20120407_20130902}
          - {station: GRASSE, start: 1984-06-01, end_exclusive: 1986-06-14, name: GRASSE_19840601_19860613}
          - {station: GRASSE, start: 1987-10-01, end_exclusive: 2005-08-02, name: GRASSE_19871001_20050801}
          - {station: GRASSE, start: 1996-12-10, end_exclusive: 1997-01-19, name: GRASSE_19961210_19970118}
          - {station: GRASSE, start: 1997-02-08, end_exclusive: 1998-06-25, name: GRASSE_19970208_19980624}
          - {station: GRASSE, start: 2004-12-04, end_exclusive: 2004-12-08, name: GRASSE_20041204_20041207}
          - {station: GRASSE, start: 2005-01-03, end_exclusive: 2005-01-07, name: GRASSE_20050103_20050106}
          - {station: GRASSE, start: 2009-11-01, end_exclusive: 2014-01-02, name: GRASSE_20091101_20140101}
          - {station: HALEAKALA, start: 1984-11-01, end_exclusive: 1990-09-02, name: HALEAKALA_19841101_19900901}
          - {station: HALEAKALA, start: 1984-11-01, end_exclusive: 1986-04-02, name: HALEAKALA_19841101_19860401}
          - {station: HALEAKALA, start: 1986-04-02, end_exclusive: 1987-07-31, name: HALEAKALA_19860402_19870730}
          - {station: HALEAKALA, start: 1987-07-31, end_exclusive: 1987-08-15, name: HALEAKALA_19870731_19870814}
          - {station: HALEAKALA, start: 1985-06-09, end_exclusive: 1985-06-11, name: HALEAKALA_19850609_19850610}
          - {station: HALEAKALA, start: 1989-01-28, end_exclusive: 1989-01-30, name: HALEAKALA_19890128_19890129}
          - {station: HALEAKALA, start: 1989-08-23, end_exclusive: 1989-08-25, name: HALEAKALA_19890823_19890824}
          - {station: HALEAKALA, start: 1990-02-06, end_exclusive: 1990-09-02, name: HALEAKALA_19900206_19900901}
          - {station: MCDONALD, start: 1969-01-01, end_exclusive: 1985-07-02, name: MCDONALD_19690101_19850701}
          - {station: MCDONALD, start: 1971-12-01, end_exclusive: 1972-12-06, name: MCDONALD_19711201_19721205}
          - {station: MCDONALD, start: 1972-04-21, end_exclusive: 1972-04-28, name: MCDONALD_19720421_19720427}
          - {station: MCDONALD, start: 1974-08-18, end_exclusive: 1974-10-17, name: MCDONALD_19740818_19741016}
          - {station: MCDONALD, start: 1975-10-05, end_exclusive: 1976-03-02, name: MCDONALD_19751005_19760301}
          - {station: MCDONALD, start: 1983-12-01, end_exclusive: 1984-01-18, name: MCDONALD_19831201_19840117}
          - {station: MATERA, start: 2003-01-01, end_exclusive: 2016-01-02, name: MATERA_20030101_20160101}
          - {station: MLRS1, start: 1983-08-01, end_exclusive: 1988-01-29, name: MLRS1_19830801_19880128}
          - {station: WETTZELL, start: 2018-01-01, end_exclusive: null, name: WETTZELL_20180101_PRESENT}

    # -------------------------------------------------------------------------
    # Nonlinear adjustment and irreversible prefit gross screening
    # -------------------------------------------------------------------------
    adjustment:
      # Prefit uncertainty quality control. Reported one-way sigmas below
      # max(minimumOneWaySigmaM, minimumFractionOfGroupMedian * group median)
      # are floored once and then kept fixed across all relinearizations. Groups
      # are the station/equipment-era VCE components configured below.
      uncertaintyFloor:
        minimumOneWaySigmaM: 1.0e-3
        minimumFractionOfGroupMedian: 0.1

      # Materialize A/l/sigma once per linearization point so repeated robust/VCE
      # iterations use vectorized BLAS operations. The streaming backend remains
      # available for numerical comparison and unusually large parameter sets.
      linearizationBackend: dense
      warmStartStochasticModelAcrossStages: true

      # Nonlinear outer-loop limit. Each outer loop computes O-C/design once,
      # performs a bounded IGGIII/VCE block, then always applies the parameter
      # correction before the next linearization.
      maximumLinearizations: 10
      # Default tolerance for parameter blocks without an explicit override.
      updateToleranceM: 2.0e-3
      updateToleranceByBlockM:
        ReflectorPositionParametrization: 1.0e-3
        StationRangeBiasParametrization: 2.0e-3
      # Require two successive outer iterations with a stable stochastic model
      # and sub-millimetre parameter corrections.
      requiredConsecutiveConvergedLinearizations: 1

      # GROOPS-style staged parameter processing. Each stage reuses the
      # parameter objects updated by the previous stage as its new a priori state.
      stages:
        - name: reflector
          parametrizations:
            - ReflectorPositionParametrization
          maximumLinearizations: 8
          updateToleranceM: 1.0e-3
        - name: bias
          parametrizations:
            - StationRangeBiasParametrization
          maximumLinearizations: 8
          updateToleranceM: 2.0e-3
        - name: joint
          parametrizations:
            - ReflectorPositionParametrization
            - StationRangeBiasParametrization
          # Half-step parameter updates suppress the observed Apollo 15 y/z
          # sign-alternating joint oscillation. Convergence is still tested
          # against the full, undamped candidate correction.
          parameterUpdateFactor: 0.5
          maximumLinearizations: 10
          updateToleranceM: 2.0e-3

      # Applied once before Bias initialization, MAD, VCE, or IGGIII.
      # These observations never re-enter the solution.
      prefitGrossThresholdM: 2
      prefitGrossThresholdByStationM:
        APOLLO: 0.5
        GRASSE: 1.0
        MATERA: 0.5
        WETTZELL: 0.5
        HALEAKALA: 1.5
        MCDONALD: 2.0
        MLRS1: 1.5
        MLRS2: 1.5

    initialization:
      biasWeightCap: 1.0e+12
      biasMaximumIterations: 30
      minimumMadCount: 10
      minimumInitialScale: 1.0

    robustEstimation:
      k0: 1.5
      k1: 6.0
      # Studentized residual correction for observations with high adjustment leverage.
      minimumOneMinusLeverage: 1.0e-8
      activeFactorThreshold: 1.0e-12
      # Zero IGGIII targets are rejected immediately. Changes wholly below this
      # floor are ignored for convergence; near-full factors snap to 1.
      convergenceFactorFloor: 1.0e-3
      changeQuantile: 0.999

    vce:
      # Bounded stochastic block per outer linearization. Hitting this limit
      # no longer aborts the adjustment; the current parameter correction is
      # applied and O-C/design are recomputed.
      maximumIterations: 8
      minimumEffectiveRedundancy: 20.0

      # Convergence is evaluated on undamped fixed-point targets, not on the
      # smaller applied step. A few threshold observations cannot dominate the
      # decision, but active/rejected membership must remain stable.
      scaleLogTolerance: 2.5e-2
      targetFactorChangeTolerance: 2.0e-2
      targetActiveSetChangeTolerance: 1.0e-3

      # IGGIII factors and bounded Helmert variance targets are applied directly.
      # Protect a single VCE update from an extreme raw component variance.
      minimumVarianceRatioPerIteration: 0.25
      maximumVarianceRatioPerIteration: 4.0

      # Exactly one component must match each retained observation.
      # CERGA MeO/IR overlap is separated by laser wavelength. The strict one-match rule is
      # enforced directly and is not a configurable policy.
      components:
        - {id: MCDONALD_1969_1985, stationSystem: MCDONALD, stationAliases: [MCDONALD], start: 1969-01-01, endExclusive: 1986-01-01}
        - {id: MLRS1_1983_1988, stationSystem: MLRS1, stationAliases: [MLRS1], start: 1983-01-01, endExclusive: 1989-01-01}
        - {id: MLRS2_1988_2015, stationSystem: MLRS2, stationAliases: [MLRS2], start: 1988-01-01, endExclusive: 2016-01-01}
        - {id: HALEAKALA_1984_1990, stationSystem: HALEAKALA, stationAliases: [HALEAKALA], start: 1984-01-01, endExclusive: 1991-01-01}
        - {id: CERGA_RUBY_1984_1986, stationSystem: CERGA_RUBY, stationAliases: [GRASSE, CERGA], start: 1984-01-01, endExclusive: 1987-01-01}
        - {id: CERGA_YAG_1987_2005, stationSystem: CERGA_YAG, stationAliases: [GRASSE, CERGA], start: 1987-01-01, endExclusive: 2006-01-01}
        - {id: CERGA_MEO_2009_PRESENT, stationSystem: CERGA_MEO, stationAliases: [GRASSE, CERGA], start: 2009-01-01, endExclusive: null, wavelengthMaxExclusiveNm: 700.0}
        - {id: CERGA_IR_2015_PRESENT, stationSystem: CERGA_IR, stationAliases: [GRASSE, CERGA], start: 2015-01-01, endExclusive: null, wavelengthMinNm: 700.0}
        - {id: APACHE_2006_PRESENT, stationSystem: APACHE, stationAliases: [APOLLO, APACHE, APOL], start: 2006-01-01, endExclusive: null}
        - {id: MATERA_2003_PRESENT, stationSystem: MATERA, stationAliases: [MATERA], start: 2003-01-01, endExclusive: null}
        - {id: WETTZELL_2018_PRESENT, stationSystem: WETTZELL, stationAliases: [WETTZELL], start: 2018-01-01, endExclusive: null}

    # MPI task granularity; ignored in normal serial execution.
    mpi:
      chunksize: 32

    # Full diagnostic JSON. In addition to observation records, this contains:
    # - summary and termination_reason;
    # - equation_evaluations and nonlinear linearizations;
    # - fixed-linearization stochastic iterations;
    # - parameter precision/correlation diagnostics;
    # - global and component residual/factor distributions.
    outputJson: "{outputDir}/reflector_bias_adjustment4.json"

    # Final weighted normal equations for independent inspection/re-solving.
    # writes:
    #   {outputNormals}.npz
    #   {outputNormals}.parameters.json
    outputNormals: "{outputDir}/reflector_bias_adjustment_normals4"
